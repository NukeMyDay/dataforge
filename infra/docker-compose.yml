services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dataforge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: dataforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://dataforge:${DB_PASSWORD}@postgres:5432/dataforge
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dataforge.rule=Host(`api.gonear.de`)"
      - "traefik.http.routers.dataforge.entrypoints=websecure"
      - "traefik.http.routers.dataforge.tls.certresolver=letsencrypt"
      - "traefik.http.services.dataforge.loadbalancer.server.port=3000"
    networks:
      - internal
      - traefik-public

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://dataforge:${DB_PASSWORD}@postgres:5432/dataforge
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true
