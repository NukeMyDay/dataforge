services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dataforge
      POSTGRES_PASSWORD: dataforge
      POSTGRES_DB: dataforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://dataforge:dataforge@postgres:5432/dataforge
      PORT: 3000
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    restart: unless-stopped
    environment:
      INTERNAL_API_KEY: sf_internal_847a617db525e1c816fac1f23e88f8880bc680f58effc586
    ports:
      - "8081:80"
    depends_on:
      - api

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://dataforge:dataforge@postgres:5432/dataforge
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
